<!DOCTYPE HTML>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Cerium</title>
<link rel="icon" type="image/png" href="/blog/cerium/images/icon.png">

<!-- Markdown parser -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: "SF Mono", Consolas, "Liberation Mono", Menlo, monospace;
    line-height: 1.6;
    color: #fff;
    background-color: #000;
    overflow-x: hidden;
}

.container {
    max-width: 800px;
    margin: 0 auto;
    padding: 2rem;
}

header, #two, footer {
    background-color: #000;
    width: 100%;
}

header {
    padding-bottom: 1rem;
}

header h1 {
    font-size: 2.5rem;
    margin-bottom: 1rem;
}

#two {
    padding-top: 1rem;
    padding-bottom: 2rem;
}

#two h2 {
    font-size: 2rem;
    margin-bottom: 1rem;
}

#two p {
    font-size: 1.2rem;
    margin-bottom: 1rem;
}

footer {
    padding: 1rem 0;
    color: #aaa;
    text-align: center;
}

@media (max-width: 600px) {
    header h1 { font-size: 2rem; }
    #two h2 { font-size: 1.5rem; }
    #two p { font-size: 1rem; }
}
</style>
</head>

<body>
<div class="container">

<header>
<h1>Cerium</h1>
</header>

<section id="two">
<div id="markdown-content">Loading...</div>
</section>

<footer>
&copy; 2026 Bean Pringles
</footer>

</div>

<script>
fetch("text.md")
  .then(response => response.text())
  .then(markdown => {
      document.getElementById("markdown-content").innerHTML =
          marked.parse(markdown);
  })
  .catch(err => {
      document.getElementById("markdown-content").innerHTML =
          "Failed to load markdown.";
      console.error(err);
  });
</script>

</body>
</html>
